<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>席替えシャッフラー</title>
<style>
  :root {
    --bg: #f8fafc;
    --card: #fff;
    --border: #e2e8f0;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --text: #1e293b;
    --muted: #64748b;
    --success: #22c55e;
    --warn: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h3 {
    font-size: 0.95rem;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .form-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: flex-end;
  }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
  }
  .form-group input, .form-group select {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    width: 140px;
  }
  .btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-success {
    background: var(--success);
    color: #fff;
  }
  .btn-success:hover { opacity: 0.9; }
  .btn-warn {
    background: var(--warn);
    color: #fff;
  }
  .btn-warn:hover { opacity: 0.9; }
  .btn-ghost {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: #f1f5f9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ラウンド設定 */
  .round-settings-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    font-size: 0.88rem;
  }
  .round-settings-row label {
    font-weight: 600;
    min-width: 52px;
  }
  .round-settings-row select {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
  }
  .theme-name-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.85rem;
  }
  .theme-name-row input {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    width: 160px;
  }
  .theme-name-row .theme-label {
    font-weight: 600;
    color: var(--muted);
    min-width: 60px;
  }

  /* 結果テーブル */
  .result-section { margin-top: 24px; }
  .result-section h2 {
    font-size: 1.1rem;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .round-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .table-card {
    background: #f1f5f9;
    border-radius: 10px;
    padding: 12px;
  }
  .table-card h4 {
    font-size: 0.85rem;
    color: var(--accent);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--accent);
  }
  .table-card .member {
    font-size: 0.85rem;
    padding: 3px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .member .num {
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* 重複ペア分析 */
  .stats {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 16px;
    padding: 10px 14px;
    background: #f1f5f9;
    border-radius: 8px;
  }
  .stats .good { color: var(--success); font-weight: 600; }
  .stats .warn { color: var(--warn); font-weight: 600; }

  /* 番号→テーブル一覧表 */
  .person-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    margin-top: 8px;
  }
  .person-table th, .person-table td {
    border: 1px solid var(--border);
    padding: 6px 12px;
    text-align: center;
  }
  .person-table th {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .person-table tr:nth-child(even) { background: #f8fafc; }

  /* 名簿入力テーブル */
  .name-input-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    margin-bottom: 12px;
  }
  .name-input-table th, .name-input-table td {
    border: 1px solid var(--border);
    padding: 4px 8px;
    text-align: left;
  }
  .name-input-table th {
    background: #f1f5f9;
    font-weight: 600;
    text-align: center;
  }
  .name-input-table th:first-child { width: 50px; }
  .name-input-table input {
    width: 100%;
    border: none;
    padding: 4px;
    font-size: 0.85rem;
    outline: none;
  }

  .toggle-section {
    margin-bottom: 16px;
  }
  .toggle-btn {
    font-size: 0.82rem;
    color: var(--accent);
    cursor: pointer;
    background: none;
    border: none;
    font-weight: 600;
    padding: 0;
  }
  .toggle-btn:hover { text-decoration: underline; }

  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .round-mode-badge {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    margin-left: 8px;
  }
  .badge-random { background: var(--accent); color: #fff; }
  .badge-theme { background: #ddd6fe; color: #7c3aed; }

  @media (max-width: 600px) {
    .form-row { flex-direction: column; gap: 12px; }
    .form-group input, .form-group select { width: 100%; }
    .round-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🪑 席替えシャッフラー</h1>
  <p class="subtitle">交流会・イベントの席替えをランダムに割り振り。テーマ別の席分けにも対応。</p>

  <div class="card">
    <div class="form-row">
      <div class="form-group">
        <label>参加人数</label>
        <input type="number" id="numPeople" value="16" min="2" max="200">
      </div>
      <div class="form-group">
        <label>テーブル数</label>
        <input type="number" id="numTables" value="4" min="2" max="50">
      </div>
      <div class="form-group">
        <label>席替え回数</label>
        <input type="number" id="numRounds" value="3" min="1" max="10">
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button class="btn btn-primary" onclick="generate()">🎲 シャッフル！</button>
      </div>
    </div>

    <!-- ラウンド設定 -->
    <div id="round-settings-area" style="margin-bottom:16px">
      <h3>🔧 ラウンド設定</h3>
      <div class="theme-name-row">
        <span class="theme-label">テーマ名:</span>
        <input type="text" id="theme1-name" value="テーマ1" placeholder="例: 年代別" oninput="onThemeNameChange()">
        <input type="text" id="theme2-name" value="テーマ2" placeholder="例: 5つの力" oninput="onThemeNameChange()">
      </div>
      <div id="round-settings-rows"></div>
    </div>

    <!-- 名前・テーマ入力 -->
    <div class="toggle-section">
      <button class="toggle-btn" onclick="toggleNameInput()">📝 名前・テーマを入力する（任意）</button>
      <div id="name-input-area" style="display:none;margin-top:12px">
        <p class="hint">スプレッドシートからコピペできます（タブ区切り: 名前 → テーマ1 → テーマ2）。名前だけの貼り付けもOK。</p>
        <textarea id="name-paste" rows="6" placeholder="田中太郎&#9;20代&#9;稼ぐ力&#10;山田花子&#9;30代&#9;貯める力&#10;佐藤次郎&#9;20代&#9;守る力&#10;&#10;※タブ区切りでスプレッドシートから貼り付け&#10;※名前だけでもOK" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.88rem;resize:vertical;margin-bottom:8px;font-family:monospace"></textarea>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
          <button class="btn btn-ghost" style="font-size:0.82rem" onclick="applyPastedNames()">反映</button>
          <button class="btn btn-ghost" style="font-size:0.82rem;color:#ef4444" onclick="clearNames()">クリア</button>
          <span id="name-count-badge" style="font-size:0.78rem;color:var(--muted)"></span>
        </div>
        <div id="name-input-table-wrap"></div>
      </div>
    </div>
  </div>

  <div id="result"></div>
</div>

<script>
// ── 状態 ──
let nameInputVisible = false;

// ── テーマ名 ──
function getThemeName(idx) {
  if (idx === 1) return document.getElementById('theme1-name').value.trim() || 'テーマ1';
  if (idx === 2) return document.getElementById('theme2-name').value.trim() || 'テーマ2';
  return '';
}

function onThemeNameChange() {
  buildRoundSettings();
  if (nameInputVisible) updateTableHeader();
}

function updateTableHeader() {
  const th1 = document.getElementById('th-theme1');
  const th2 = document.getElementById('th-theme2');
  if (th1) th1.textContent = getThemeName(1);
  if (th2) th2.textContent = getThemeName(2);
}

// ── ラウンド設定 ──
function buildRoundSettings() {
  const n = parseInt(document.getElementById('numRounds').value) || 3;
  const wrap = document.getElementById('round-settings-rows');
  // 既存の選択値を保持
  const existing = {};
  wrap.querySelectorAll('select[data-round]').forEach(sel => {
    existing[sel.dataset.round] = sel.value;
  });

  const t1 = getThemeName(1);
  const t2 = getThemeName(2);

  let html = '';
  for (let r = 1; r <= n; r++) {
    const prev = existing[r] || 'random';
    html += `<div class="round-settings-row">
      <label>${r}回目:</label>
      <select data-round="${r}">
        <option value="random"${prev === 'random' ? ' selected' : ''}>ランダム</option>
        <option value="theme1"${prev === 'theme1' ? ' selected' : ''}>${escHtml(t1)}</option>
        <option value="theme2"${prev === 'theme2' ? ' selected' : ''}>${escHtml(t2)}</option>
      </select>
    </div>`;
  }
  wrap.innerHTML = html;
}

document.getElementById('numRounds').addEventListener('change', buildRoundSettings);

function getRoundModes() {
  const modes = [];
  document.querySelectorAll('#round-settings-rows select[data-round]').forEach(sel => {
    modes.push(sel.value);
  });
  return modes;
}

// ── 名前・テーマ入力 ──
function toggleNameInput() {
  nameInputVisible = !nameInputVisible;
  const area = document.getElementById('name-input-area');
  area.style.display = nameInputVisible ? '' : 'none';
  if (nameInputVisible) buildNameInputTable();
}

function applyPastedNames() {
  const text = document.getElementById('name-paste').value;
  const lines = text.split(/\n/).map(l => l.trim()).filter(l => l);
  if (lines.length === 0) return;

  // タブ区切り検出
  const hasTab = lines.some(l => l.includes('\t'));
  let dataLines = lines;

  // ヘッダー行の自動検出
  if (hasTab && lines.length > 1) {
    const firstCols = lines[0].split('\t').map(c => c.trim());
    const headerWords = /名前|テーマ|name|theme|カテゴリ|年代|属性|No|番号/i;
    if (firstCols.some(c => headerWords.test(c))) {
      // ヘッダーからテーマ名を取得
      if (firstCols[1]) {
        document.getElementById('theme1-name').value = firstCols[1];
      }
      if (firstCols[2]) {
        document.getElementById('theme2-name').value = firstCols[2];
      }
      onThemeNameChange();
      dataLines = lines.slice(1);
    }
  }

  // 人数を自動更新
  document.getElementById('numPeople').value = dataLines.length;
  buildNameInputTable();

  // 各行を反映
  dataLines.forEach((line, i) => {
    const cols = hasTab ? line.split('\t').map(c => c.trim()) : [line.trim()];
    const num = i + 1;
    const nameInp = document.querySelector(`#name-input-table-wrap input[data-col="name"][data-num="${num}"]`);
    const t1Inp = document.querySelector(`#name-input-table-wrap input[data-col="theme1"][data-num="${num}"]`);
    const t2Inp = document.querySelector(`#name-input-table-wrap input[data-col="theme2"][data-num="${num}"]`);
    if (nameInp && cols[0]) nameInp.value = cols[0];
    if (t1Inp && cols[1]) t1Inp.value = cols[1];
    if (t2Inp && cols[2]) t2Inp.value = cols[2];
  });

  updateNameCount();
}

function clearNames() {
  document.getElementById('name-paste').value = '';
  document.querySelectorAll('#name-input-table-wrap input[data-num]').forEach(inp => inp.value = '');
  updateNameCount();
}

function updateNameCount() {
  const inputs = document.querySelectorAll('#name-input-table-wrap input[data-col="name"][data-num]');
  const filled = Array.from(inputs).filter(inp => inp.value.trim()).length;
  const badge = document.getElementById('name-count-badge');
  badge.textContent = filled > 0 ? `${filled}名入力済み` : '';
}

function buildNameInputTable() {
  const n = parseInt(document.getElementById('numPeople').value) || 16;
  const wrap = document.getElementById('name-input-table-wrap');
  // 既存データを保持
  const existingName = {};
  const existingT1 = {};
  const existingT2 = {};
  wrap.querySelectorAll('input[data-col="name"][data-num]').forEach(inp => {
    if (inp.value.trim()) existingName[inp.dataset.num] = inp.value.trim();
  });
  wrap.querySelectorAll('input[data-col="theme1"][data-num]').forEach(inp => {
    if (inp.value.trim()) existingT1[inp.dataset.num] = inp.value.trim();
  });
  wrap.querySelectorAll('input[data-col="theme2"][data-num]').forEach(inp => {
    if (inp.value.trim()) existingT2[inp.dataset.num] = inp.value.trim();
  });

  const t1 = getThemeName(1);
  const t2 = getThemeName(2);

  let html = `<table class="name-input-table">
    <tr><th>No.</th><th>名前</th><th id="th-theme1">${escHtml(t1)}</th><th id="th-theme2">${escHtml(t2)}</th></tr>`;
  for (let i = 1; i <= n; i++) {
    html += `<tr>
      <th>${i}</th>
      <td><input type="text" data-col="name" data-num="${i}" value="${escAttr(existingName[i] || '')}" placeholder="（番号${i}）" oninput="updateNameCount()"></td>
      <td><input type="text" data-col="theme1" data-num="${i}" value="${escAttr(existingT1[i] || '')}" placeholder=""></td>
      <td><input type="text" data-col="theme2" data-num="${i}" value="${escAttr(existingT2[i] || '')}" placeholder=""></td>
    </tr>`;
  }
  html += '</table>';
  wrap.innerHTML = html;
  updateNameCount();
}

document.getElementById('numPeople').addEventListener('change', () => {
  if (nameInputVisible) buildNameInputTable();
});

function getNames() {
  const n = parseInt(document.getElementById('numPeople').value) || 16;
  const names = {};
  document.querySelectorAll('#name-input-table-wrap input[data-col="name"][data-num]').forEach(inp => {
    if (inp.value.trim()) names[parseInt(inp.dataset.num)] = inp.value.trim();
  });
  const result = [];
  for (let i = 1; i <= n; i++) {
    result.push(names[i] || `${i}番`);
  }
  return result;
}

function getThemes(themeKey) {
  const n = parseInt(document.getElementById('numPeople').value) || 16;
  const themes = [];
  for (let i = 1; i <= n; i++) {
    const inp = document.querySelector(`#name-input-table-wrap input[data-col="${themeKey}"][data-num="${i}"]`);
    themes.push(inp && inp.value.trim() ? inp.value.trim() : '');
  }
  return themes;
}

// ── テーブル名 ──
function tableName(idx) {
  return String.fromCharCode(65 + idx) + 'テーブル';
}

// ── シャッフルユーティリティ ──
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── コア: 生成 ──
function generate() {
  const numPeople = parseInt(document.getElementById('numPeople').value);
  const numTables = parseInt(document.getElementById('numTables').value);
  const numRounds = parseInt(document.getElementById('numRounds').value);
  const roundModes = getRoundModes();

  if (numPeople < 2 || numTables < 2 || numRounds < 1) {
    alert('入力値を確認してください');
    return;
  }
  if (numTables > numPeople) {
    alert('テーブル数は参加人数以下にしてください');
    return;
  }

  // テーマ使用チェック
  const usesTheme1 = roundModes.includes('theme1');
  const usesTheme2 = roundModes.includes('theme2');
  const themes1 = usesTheme1 ? getThemes('theme1') : [];
  const themes2 = usesTheme2 ? getThemes('theme2') : [];

  if (usesTheme1 && themes1.every(t => !t)) {
    alert(getThemeName(1) + 'のデータが入力されていません。\n名前・テーマを入力してください。');
    return;
  }
  if (usesTheme2 && themes2.every(t => !t)) {
    alert(getThemeName(2) + 'のデータが入力されていません。\n名前・テーマを入力してください。');
    return;
  }

  // 複数回試行してベストを選ぶ
  let bestResult = null;
  let bestScore = Infinity;
  const attempts = 300;

  for (let attempt = 0; attempt < attempts; attempt++) {
    const result = tryGenerate(numPeople, numTables, numRounds, roundModes, themes1, themes2);
    const score = countDuplicatePairs(result.map(r => r.tables), numPeople);
    if (score < bestScore) {
      bestScore = score;
      bestResult = result;
      if (score === 0) break;
    }
  }

  renderResult(bestResult, numPeople, numTables, numRounds, bestScore, roundModes);
}

function tryGenerate(numPeople, numTables, numRounds, roundModes, themes1, themes2) {
  const roundResults = [];
  const pairCount = Array.from({ length: numPeople }, () => new Array(numPeople).fill(0));

  for (let r = 0; r < numRounds; r++) {
    const mode = roundModes[r] || 'random';
    let roundData;

    if (mode === 'random') {
      roundData = tryRandomRound(numPeople, numTables, pairCount);
    } else {
      const themes = mode === 'theme1' ? themes1 : themes2;
      const themeName = mode === 'theme1' ? getThemeName(1) : getThemeName(2);
      roundData = tryThemeRound(numPeople, numTables, themes, themeName, pairCount);
    }

    // pairCount更新
    for (const table of roundData.tables) {
      for (let i = 0; i < table.length; i++) {
        for (let j = i + 1; j < table.length; j++) {
          pairCount[table[i]][table[j]]++;
          pairCount[table[j]][table[i]]++;
        }
      }
    }
    roundResults.push(roundData);
  }
  return roundResults;
}

// ── ランダムラウンド（既存アルゴリズム） ──
function tryRandomRound(numPeople, numTables, pairCount) {
  const baseSize = Math.floor(numPeople / numTables);
  const extra = numPeople % numTables;
  const tableSizes = [];
  for (let t = 0; t < numTables; t++) {
    tableSizes.push(baseSize + (t < extra ? 1 : 0));
  }

  let bestRound = null;
  let bestScore = Infinity;
  const innerAttempts = 20;

  for (let a = 0; a < innerAttempts; a++) {
    const tables = assignRandomRound(numPeople, numTables, tableSizes, pairCount);
    const score = scoreRound(tables, pairCount);
    if (score < bestScore) {
      bestScore = score;
      bestRound = tables;
      if (score === 0) break;
    }
  }

  const labels = bestRound.map((_, i) => tableName(i));
  return { tables: bestRound, labels, mode: 'random' };
}

function assignRandomRound(numPeople, numTables, tableSizes, pairCount) {
  const people = shuffle(Array.from({ length: numPeople }, (_, i) => i));
  const tables = Array.from({ length: numTables }, () => []);

  for (const person of people) {
    let bestCost = Infinity;
    const candidates = [];

    for (let t = 0; t < numTables; t++) {
      if (tables[t].length >= tableSizes[t]) continue;
      let cost = 0;
      for (const other of tables[t]) {
        cost += pairCount[person][other];
      }
      if (cost < bestCost) {
        bestCost = cost;
        candidates.length = 0;
        candidates.push(t);
      } else if (cost === bestCost) {
        candidates.push(t);
      }
    }

    if (candidates.length > 1) {
      candidates.sort((a, b) => tables[a].length - tables[b].length);
      const minLen = tables[candidates[0]].length;
      const tied = candidates.filter(c => tables[c].length === minLen);
      tables[tied[Math.floor(Math.random() * tied.length)]].push(person);
    } else {
      tables[candidates[0]].push(person);
    }
  }
  return tables;
}

// ── テーマ別ラウンド ──
function tryThemeRound(numPeople, numTables, themes, themeName, pairCount) {
  // テーマごとにグループ化
  const groups = {};
  const noTheme = [];
  for (let i = 0; i < numPeople; i++) {
    const t = themes[i] || '';
    if (!t) {
      noTheme.push(i);
    } else {
      if (!groups[t]) groups[t] = [];
      groups[t].push(i);
    }
  }

  // テーブルの最大人数
  const maxPerTable = Math.ceil(numPeople / numTables);

  const tables = [];
  const labels = [];

  // テーマグループごとにテーブル割り当て
  const sortedThemes = Object.keys(groups).sort((a, b) => groups[b].length - groups[a].length);

  for (const theme of sortedThemes) {
    const members = shuffle([...groups[theme]]);

    if (members.length <= maxPerTable) {
      // 1テーブルに収まる
      tables.push(members);
      labels.push(theme);
    } else {
      // 複数テーブルに分割
      const numSplit = Math.ceil(members.length / maxPerTable);
      const splitSize = Math.ceil(members.length / numSplit);
      for (let s = 0; s < numSplit; s++) {
        const chunk = members.slice(s * splitSize, (s + 1) * splitSize);
        if (chunk.length > 0) {
          tables.push(chunk);
          labels.push(numSplit > 1 ? `${theme}(${s + 1})` : theme);
        }
      }
    }
  }

  // テーマ未回答の人を既存テーブルの空きに分配、または別テーブルに
  if (noTheme.length > 0) {
    const shuffledNoTheme = shuffle([...noTheme]);
    // まず空きのあるテーブルに入れる
    let idx = 0;
    for (let t = 0; t < tables.length && idx < shuffledNoTheme.length; t++) {
      while (tables[t].length < maxPerTable && idx < shuffledNoTheme.length) {
        tables[t].push(shuffledNoTheme[idx++]);
      }
    }
    // まだ残りがある場合は新テーブル作成
    while (idx < shuffledNoTheme.length) {
      const chunk = shuffledNoTheme.slice(idx, idx + maxPerTable);
      tables.push(chunk);
      labels.push('未回答');
      idx += maxPerTable;
    }
  }

  return { tables, labels, mode: 'theme' };
}

function scoreRound(tables, pairCount) {
  let score = 0;
  for (const table of tables) {
    for (let i = 0; i < table.length; i++) {
      for (let j = i + 1; j < table.length; j++) {
        score += pairCount[table[i]][table[j]];
      }
    }
  }
  return score;
}

function countDuplicatePairs(allTables, numPeople) {
  const pairCount = Array.from({ length: numPeople }, () => new Array(numPeople).fill(0));
  for (const round of allTables) {
    for (const table of round) {
      for (let i = 0; i < table.length; i++) {
        for (let j = i + 1; j < table.length; j++) {
          pairCount[table[i]][table[j]]++;
        }
      }
    }
  }
  let dupes = 0;
  for (let i = 0; i < numPeople; i++) {
    for (let j = i + 1; j < numPeople; j++) {
      if (pairCount[i][j] > 1) dupes += pairCount[i][j] - 1;
    }
  }
  return dupes;
}

// ── 結果表示 ──
function renderResult(roundResults, numPeople, numTables, numRounds, dupeScore, roundModes) {
  const names = getNames();
  let html = '<div class="result-section">';

  // 統計
  const statsClass = dupeScore === 0 ? 'good' : 'warn';
  const statsText = dupeScore === 0
    ? '全ラウンドで同じ人との重複なし！'
    : `重複ペア: ${dupeScore}組（完全回避が困難な組み合わせです）`;
  html += `<div class="stats"><span class="${statsClass}">${statsText}</span>　参加者${numPeople}名 / ${numTables}テーブル / ${numRounds}回</div>`;

  // 各ラウンドのテーブル表示
  for (let r = 0; r < roundResults.length; r++) {
    const rd = roundResults[r];
    const modeLabel = rd.mode === 'random'
      ? '<span class="round-mode-badge badge-random">ランダム</span>'
      : `<span class="round-mode-badge badge-theme">${escHtml(roundModes[r] === 'theme1' ? getThemeName(1) : getThemeName(2))}</span>`;

    html += `<h2>🔄 ${r + 1}回目${modeLabel}</h2><div class="round-grid">`;
    for (let t = 0; t < rd.tables.length; t++) {
      html += `<div class="table-card"><h4>${escHtml(rd.labels[t])}</h4>`;
      for (const p of rd.tables[t]) {
        html += `<div class="member"><span class="num">${p + 1}</span> ${escHtml(names[p])}</div>`;
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // 番号別一覧表
  html += '<h2>📋 番号別テーブル一覧</h2>';
  html += '<table class="person-table"><tr><th>番号</th><th>名前</th>';
  for (let r = 0; r < numRounds; r++) {
    html += `<th>${r + 1}回目</th>`;
  }
  html += '</tr>';

  // 各人のテーブル割り当てを集計
  const personTables = Array.from({ length: numPeople }, () => []);
  for (let r = 0; r < roundResults.length; r++) {
    const rd = roundResults[r];
    for (let t = 0; t < rd.tables.length; t++) {
      for (const p of rd.tables[t]) {
        personTables[p].push(rd.labels[t]);
      }
    }
  }

  for (let p = 0; p < numPeople; p++) {
    html += `<tr><td><b>${p + 1}</b></td><td>${escHtml(names[p])}</td>`;
    for (const tn of personTables[p]) {
      html += `<td>${escHtml(tn)}</td>`;
    }
    html += '</tr>';
  }
  html += '</table>';

  // ダウンロードボタン
  html += `<div class="actions" style="margin-top:16px">
    <button class="btn btn-success" onclick="downloadCSV()">📥 CSVダウンロード</button>
    <button class="btn btn-warn" onclick="downloadExcel()">📥 Excelダウンロード</button>
    <button class="btn btn-ghost" onclick="generate()">🎲 再シャッフル</button>
  </div>`;

  html += '</div>';
  document.getElementById('result').innerHTML = html;

  // データをグローバルに保持（ダウンロード用）
  window._lastResult = { roundResults, numPeople, numTables, numRounds, names, personTables, roundModes };
}

// ── CSVダウンロード ──
function downloadCSV() {
  const d = window._lastResult;
  if (!d) return;

  let csv = '\uFEFF'; // BOM
  csv += '番号,名前';
  for (let r = 0; r < d.numRounds; r++) csv += `,${r + 1}回目`;
  csv += '\n';

  for (let p = 0; p < d.numPeople; p++) {
    csv += `${p + 1},"${d.names[p]}"`;
    for (const tn of d.personTables[p]) csv += `,"${tn}"`;
    csv += '\n';
  }

  csv += '\n--- ラウンド別詳細 ---\n';
  for (let r = 0; r < d.roundResults.length; r++) {
    const rd = d.roundResults[r];
    const modeText = rd.mode === 'random' ? 'ランダム' : (d.roundModes[r] === 'theme1' ? getThemeName(1) : getThemeName(2));
    csv += `\n${r + 1}回目（${modeText}）\n`;
    for (let t = 0; t < rd.tables.length; t++) {
      const members = rd.tables[t].map(p => `${p + 1}番 ${d.names[p]}`).join(' / ');
      csv += `"${rd.labels[t]}",${members}\n`;
    }
  }

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `席替え_${d.numPeople}名_${d.numRounds}回.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Excelダウンロード ──
function downloadExcel() {
  const d = window._lastResult;
  if (!d) return;

  let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
  xml += '<?mso-application progid="Excel.Sheet"?>\n';
  xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"\n';
  xml += ' xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';

  xml += '<Styles>\n';
  xml += '<Style ss:ID="header"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#6366F1" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>\n';
  xml += '<Style ss:ID="center"><Alignment ss:Horizontal="Center"/></Style>\n';
  xml += '<Style ss:ID="tableHeader"><Font ss:Bold="1" ss:Color="#6366F1"/><Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="2" ss:Color="#6366F1"/></Borders></Style>\n';
  xml += '</Styles>\n';

  // シート1: 番号別一覧
  xml += '<Worksheet ss:Name="番号別一覧">\n<Table>\n';
  xml += '<Row>';
  xml += '<Cell ss:StyleID="header"><Data ss:Type="String">番号</Data></Cell>';
  xml += '<Cell ss:StyleID="header"><Data ss:Type="String">名前</Data></Cell>';
  for (let r = 0; r < d.numRounds; r++) {
    xml += `<Cell ss:StyleID="header"><Data ss:Type="String">${r + 1}回目</Data></Cell>`;
  }
  xml += '</Row>\n';
  for (let p = 0; p < d.numPeople; p++) {
    xml += '<Row>';
    xml += `<Cell ss:StyleID="center"><Data ss:Type="Number">${p + 1}</Data></Cell>`;
    xml += `<Cell><Data ss:Type="String">${escXml(d.names[p])}</Data></Cell>`;
    for (const tn of d.personTables[p]) {
      xml += `<Cell ss:StyleID="center"><Data ss:Type="String">${escXml(tn)}</Data></Cell>`;
    }
    xml += '</Row>\n';
  }
  xml += '</Table>\n</Worksheet>\n';

  // シート2: ラウンド別
  xml += '<Worksheet ss:Name="ラウンド別">\n<Table>\n';
  for (let r = 0; r < d.roundResults.length; r++) {
    const rd = d.roundResults[r];
    const modeText = rd.mode === 'random' ? 'ランダム' : (d.roundModes[r] === 'theme1' ? getThemeName(1) : getThemeName(2));
    xml += `<Row><Cell ss:StyleID="tableHeader"><Data ss:Type="String">${r + 1}回目（${escXml(modeText)}）</Data></Cell></Row>\n`;
    for (let t = 0; t < rd.tables.length; t++) {
      xml += '<Row>';
      xml += `<Cell><Data ss:Type="String">${escXml(rd.labels[t])}</Data></Cell>`;
      for (const p of rd.tables[t]) {
        xml += `<Cell><Data ss:Type="String">${p + 1}番 ${escXml(d.names[p])}</Data></Cell>`;
      }
      xml += '</Row>\n';
    }
    xml += '<Row></Row>\n';
  }
  xml += '</Table>\n</Worksheet>\n';
  xml += '</Workbook>';

  const blob = new Blob([xml], { type: 'application/vnd.ms-excel' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `席替え_${d.numPeople}名_${d.numRounds}回.xls`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── ユーティリティ ──
function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escXml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

buildRoundSettings();
